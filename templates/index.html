<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Curator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F6FA;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-indicator {
            display: none;
        }
        
        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            animation: fadeIn 0.15s ease-out;
        }
        .modal-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            width: 700px;
            max-width: 100vw;
            max-height: 85vh;
            overflow-y: auto;
            animation: scaleIn 0.15s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        /* Pulse animation for button when processing */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        
        .pulse-animation {
            animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite !important;
            opacity: 0.9;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #BDC3C7;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #95A5A6;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
                        </svg>
                    </div>
                    <h1 class="text-xl font-bold text-gray-800 tracking-tight">News Curator</h1>
                </div>
                
                <button 
                    type="button"
                    id="update-btn"
                    hx-post="/api/update" 
                    hx-swap="none"
                    class="group relative inline-flex items-center gap-2 px-5 py-2.5 bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white text-sm font-semibold rounded-lg transition-all duration-200 shadow-lg shadow-emerald-500/30 hover:shadow-emerald-500/40">
                    <!-- Loading state -->
                    <span class="loading-content hidden items-center gap-2">
                        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Updating...
                    </span>
                    <!-- Default state -->
                    <span class="default-content flex items-center gap-2">
                        <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        Update News
                    </span>
                </button>
            </div>
        </div>
    </header>

    <!-- Stats Section -->
    <div id="stats-section" hx-get="/htmx/stats" hx-trigger="load, refresh">
        {% include 'partials/stats.html' %}
    </div>

    <!-- Filter Tabs -->
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <div class="flex gap-2 bg-white p-1.5 rounded-xl shadow-sm border border-gray-100 w-fit">
            <a href="/?filter=all" 
               class="px-5 py-2 rounded-lg text-sm font-semibold transition-all duration-200 {% if filter_type == 'all' %}bg-blue-500 text-white shadow-md shadow-blue-500/25{% else %}text-gray-600 hover:bg-gray-50{% endif %}">
                All News
            </a>
            <a href="/?filter=local" 
               class="px-5 py-2 rounded-lg text-sm font-semibold transition-all duration-200 {% if filter_type == 'local' %}bg-blue-500 text-white shadow-md shadow-blue-500/25{% else %}text-gray-600 hover:bg-gray-50{% endif %}">
                Malaysia
            </a>
            <a href="/?filter=global" 
               class="px-5 py-2 rounded-lg text-sm font-semibold transition-all duration-200 {% if filter_type == 'global' %}bg-blue-500 text-white shadow-md shadow-blue-500/25{% else %}text-gray-600 hover:bg-gray-50{% endif %}">
                Global
            </a>
        </div>
    </div>

    <!-- Time Filter -->
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pb-2">
        <div class="flex items-center gap-2">
            <span class="text-xs text-gray-400 font-medium">Time:</span>
            <div class="flex gap-1 bg-gray-50 p-1 rounded-lg border border-gray-100">
                <button onclick="filterByTime('all')" id="tf-all" class="tf-btn px-3 py-1.5 rounded-md text-xs font-medium transition-all duration-200 bg-blue-500 text-white shadow-sm">All</button>
                <button onclick="filterByTime('daily')" id="tf-daily" class="tf-btn px-3 py-1.5 rounded-md text-xs font-medium transition-all duration-200 text-gray-500 hover:text-gray-700 hover:bg-white">Daily</button>
                <button onclick="filterByTime('weekly')" id="tf-weekly" class="tf-btn px-3 py-1.5 rounded-md text-xs font-medium transition-all duration-200 text-gray-500 hover:text-gray-700 hover:bg-white">Weekly</button>
                <button onclick="filterByTime('monthly')" id="tf-monthly" class="tf-btn px-3 py-1.5 rounded-md text-xs font-medium transition-all duration-200 text-gray-500 hover:text-gray-700 hover:bg-white">Monthly</button>
            </div>
        </div>
    </div>

    <!-- News List -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pb-8">
        <div id="news-list" hx-get="/htmx/news-list?filter={{ filter_type }}" hx-trigger="load, refresh">
            {% include 'partials/news_list.html' %}
        </div>
    </main>

    <!-- Modal -->
    <div id="modal-container"></div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div id="toast-content" class="px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3">
            <span id="toast-icon"></span>
            <span id="toast-message" class="font-medium text-sm"></span>
        </div>
    </div>

    <script>
        // ===================== Toast =====================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const content = document.getElementById('toast-content');
            const icon = document.getElementById('toast-icon');
            const msg = document.getElementById('toast-message');
            
            if (type === 'success') {
                content.className = 'px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 bg-emerald-500 text-white';
                icon.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
            } else {
                content.className = 'px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 bg-red-500 text-white';
                icon.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
            }
            
            msg.textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // ===================== Modal =====================
        const CATEGORY_EMOJI = {
            'Politics': '\u{1F3DB}\uFE0F',
            'Crime': '\u{1F6A8}',
            'Economy': '\u{1F4C8}',
            'Sports': '\u26BD',
            'Technology': '\u{1F4BB}',
            'Entertainment': '\u{1F3AC}',
            'Health': '\u{1FA7A}',
            'Education': '\u{1F393}',
            'Environment': '\u{1F33F}',
            'International': '\u{1F310}',
            'Other': '\u{1F4F0}',
        };

        function openModal(el) {
            const id = el.dataset.id;
            const url = el.dataset.url;
            const title = el.dataset.title;
            const source = el.dataset.source;
            const category = el.dataset.category || 'Other';

            const container = document.getElementById('modal-container');
            container.innerHTML = `
                <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
                    <div class="modal-card p-5" role="dialog" data-category="${escapeHtml(category)}">
                        <!-- Header -->
                        <div class="flex items-start justify-between gap-4 mb-4">
                            <h2 class="text-base font-semibold text-gray-800 leading-snug flex-1 min-w-0">${escapeHtml(title)}</h2>
                            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 flex-shrink-0 p-1 -m-1 rounded-lg hover:bg-gray-100 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>

                        <!-- Source -->
                        <div class="text-xs text-gray-400 mb-4">${escapeHtml(source)}</div>

                        <!-- Action Buttons -->
                        <div class="flex flex-col gap-2 mb-4">
                            <button id="summarize-btn" onclick="summarizeArticle('${id}')"
                                class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 hover:bg-blue-100 active:scale-[0.98] border border-blue-200 text-blue-700 text-sm font-medium transition-all">
                                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                                <span class="flex-1 text-left">Summarize this news</span>
                                <svg class="w-4 h-4 flex-shrink-0 summarize-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                            </button>
                            <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer"
                                class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gray-50 hover:bg-gray-100 active:scale-[0.98] border border-gray-200 text-gray-600 text-sm font-medium transition-all">
                                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                                </svg>
                                <span class="flex-1 text-left">Open source article</span>
                                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                            </a>
                        </div>

                        <!-- Summary Result -->
                        <div id="summary-result" class="hidden"></div>
                    </div>
                </div>
            `;

            document.addEventListener('keydown', modalKeyHandler);
        }

        function closeModal() {
            const container = document.getElementById('modal-container');
            container.innerHTML = '';
            document.removeEventListener('keydown', modalKeyHandler);
        }

        function modalKeyHandler(e) {
            if (e.key === 'Escape') closeModal();
        }

        function summarizeArticle(articleId) {
            const btn = document.getElementById('summarize-btn');
            const resultDiv = document.getElementById('summary-result');
            const arrow = btn.querySelector('.summarize-arrow');
            const cat = btn.closest('.modal-card')?.dataset.category || 'Other';
            const emoji = CATEGORY_EMOJI[cat] || CATEGORY_EMOJI['Other'];

            // Show loading
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            arrow.classList.add('animate-pulse');
            resultDiv.className = 'mt-3 p-4 rounded-xl bg-gray-50 border border-gray-100';
            resultDiv.innerHTML = '<div class="flex items-center gap-3"><svg class="w-4 h-4 animate-spin text-blue-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span class="text-sm text-gray-500">Generating summary...</span></div>';
            resultDiv.classList.remove('hidden');

            fetch('/api/summarize', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({article_id: articleId})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    const html = data.summary
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');
                    const label = data.cached ? 'Summary (cached)' : 'Summary';
                    resultDiv.innerHTML = `<div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">${label}</div><div class="text-sm text-gray-700 leading-relaxed">${emoji} ${html}</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="text-sm text-red-600">${escapeHtml(data.error || 'Failed to generate summary')}</div>`;
                }
            })
            .catch(err => {
                resultDiv.innerHTML = `<div class="text-sm text-red-600">Network error: ${escapeHtml(err.message)}</div>`;
            })
            .finally(() => {
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                arrow.classList.remove('animate-pulse');
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ===================== Category Expand/Collapse =====================
        function toggleCategory(id, btn) {
            const el = document.getElementById(id);
            if (!el) return;
            const isHidden = el.classList.contains('hidden');
            el.classList.toggle('hidden');
            if (isHidden) {
                btn.textContent = btn.textContent.replace('Show all', 'Hide').replace(' ▾', ' ▴');
            } else {
                const total = el.children.length + 5;
                btn.textContent = `Show all ${total} articles ▾`;
            }
        }

        // ===================== Time Filter =====================
        function filterByTime(period) {
            const now = new Date();
            let cutoff = null;
            if (period === 'daily') {
                cutoff = new Date(now);
                cutoff.setDate(cutoff.getDate() - 1);
            } else if (period === 'weekly') {
                cutoff = new Date(now);
                cutoff.setDate(cutoff.getDate() - 7);
            } else if (period === 'monthly') {
                cutoff = new Date(now);
                cutoff.setMonth(cutoff.getMonth() - 1);
            }

            // Update button states
            document.querySelectorAll('.tf-btn').forEach(btn => {
                btn.classList.remove('bg-blue-500', 'text-white', 'shadow-sm');
                btn.classList.add('text-gray-500');
            });
            const activeBtn = document.getElementById('tf-' + period);
            if (activeBtn) {
                activeBtn.classList.add('bg-blue-500', 'text-white', 'shadow-sm');
                activeBtn.classList.remove('text-gray-500');
            }

            // Filter articles
            document.querySelectorAll('.news-row').forEach(row => {
                const dateStr = row.dataset.date;
                if (!dateStr) { row.style.display = ''; return; }
                const rowDate = new Date(dateStr);
                if (period === 'all' || !cutoff || rowDate >= cutoff) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });

            // Update category counts
            document.querySelectorAll('.category-section').forEach(sec => {
                const visible = sec.querySelectorAll('.news-row:not([style*="display: none"])').length;
                const countEl = sec.querySelector('.cat-count');
                const total = countEl ? countEl.dataset.total : '?';
                if (countEl) countEl.textContent = '(' + visible + '/' + total + ')';
            });
        }

        // ===================== Update Button =====================
        const updateBtn = document.getElementById('update-btn');
        const loadingContent = updateBtn.querySelector('.loading-content');
        const defaultContent = updateBtn.querySelector('.default-content');
        
        document.body.addEventListener('htmx:beforeRequest', function(evt) {
            if (evt.detail.elt.id === 'update-btn') {
                defaultContent.classList.add('hidden');
                defaultContent.classList.remove('flex');
                loadingContent.classList.remove('hidden');
                loadingContent.classList.add('flex');
                updateBtn.classList.add('pulse-animation');
                updateBtn.style.pointerEvents = 'none';
            }
        });
        
        document.body.addEventListener('htmx:afterRequest', function(evt) {
            if (evt.detail.elt.id === 'update-btn') {
                defaultContent.classList.remove('hidden');
                defaultContent.classList.add('flex');
                loadingContent.classList.add('hidden');
                loadingContent.classList.remove('flex');
                updateBtn.classList.remove('pulse-animation');
                updateBtn.style.pointerEvents = 'auto';
                
                if (evt.detail.successful) {
                    htmx.trigger('#news-list', 'refresh');
                    htmx.trigger('#stats-section', 'refresh');
                    try {
                        const data = JSON.parse(evt.detail.xhr.response);
                        showToast(data.message || 'News updated!', 'success');
                    } catch(e) {
                        showToast('News updated!', 'success');
                    }
                } else {
                    showToast('Update failed. Please try again.', 'error');
                    console.error('Update error:', evt.detail.xhr.responseText);
                }
            }
        });

        document.body.addEventListener('htmx:sendError', function(evt) {
            showToast('Network error. Check your connection.', 'error');
        });
    </script>
</body>
</html>
